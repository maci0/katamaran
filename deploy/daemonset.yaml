apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: katamaran-deploy
  namespace: kube-system
  labels:
    app: katamaran
spec:
  selector:
    matchLabels:
      app: katamaran
  template:
    metadata:
      labels:
        app: katamaran
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        katacontainers.io/kata-runtime: "true"
      hostPID: true
      initContainers:
      - name: node-setup
        image: localhost/katamaran:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e

            # --- 1. Install katamaran binary ---
            mkdir -p /host/usr/local/bin
            cp /usr/local/bin/katamaran /host/usr/local/bin/katamaran
            chmod 0755 /host/usr/local/bin/katamaran
            echo "katamaran binary installed"

            # --- 2. Load required kernel modules ---
            for mod in ipip ip6_tunnel ip_gre ip6_gre sch_plug; do
              nsenter --target 1 --mount -- modprobe "$mod" 2>/dev/null \
                && echo "loaded $mod" \
                || echo "skipped $mod (not available)"
            done

            # --- 3. Enable Kata debug mode and QMP extra-monitor socket ---
            # Kata >=3.25.0 config path; older versions use a different path without runtimes/qemu/.
            KATA_CFG="/host/opt/kata/share/defaults/kata-containers/runtimes/qemu/configuration-qemu.toml"
            if [ -f "${KATA_CFG}" ]; then
              sed -i '/^\[hypervisor\.qemu\]/,/^\[/{
                s/^[[:space:]]*#\{0,1\}[[:space:]]*enable_debug = .*/enable_debug = true/
                s/^[[:space:]]*#\{0,1\}[[:space:]]*extra_monitor_socket = .*/extra_monitor_socket = "qmp"/
              }' "${KATA_CFG}"
              if grep -q '^[[:space:]]*enable_debug = true' "${KATA_CFG}" \
                && grep -q '^[[:space:]]*extra_monitor_socket = "qmp"' "${KATA_CFG}"; then
                echo "Kata debug mode and QMP extra-monitor socket enabled"
              else
                echo "Kata QMP config keys not found; leaving config unchanged"
              fi
            else
              echo "Kata config not found at ${KATA_CFG} — skipping QMP setup"
            fi

            # --- 4. Configure Kata to use katamaran factory for VM caching ---
            if [ -n "${KATA_CFG}" ] && [ -f "${KATA_CFG}" ]; then
              if ! grep -q 'vm_cache_endpoint.*katamaran' "${KATA_CFG}"; then
                sed -i '/^\[factory\]/,/^\[/{
                  s|^#*vm_cache_number.*|vm_cache_number = 1|
                  s|^#*vm_cache_endpoint.*|vm_cache_endpoint = "/var/run/katamaran/factory.sock"|
                }' "${KATA_CFG}"
                if grep -q 'vm_cache_endpoint = "/var/run/katamaran/factory.sock"' "${KATA_CFG}"; then
                  echo "Kata factory endpoint configured for katamaran"
                else
                  echo "Kata [factory] section not found; skipping factory config"
                fi
              else
                echo "Kata factory endpoint already configured"
              fi
            fi
        volumeMounts:
        - name: host-root
          mountPath: /host
          mountPropagation: HostToContainer
      containers:
      - name: keepalive
        image: localhost/katamaran:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 1m
            memory: 8Mi
          limits:
            cpu: 10m
            memory: 16Mi
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "katamaran node setup complete"
            trap 'rm -f /host-bin/katamaran; echo "katamaran binary removed"' TERM
            sleep infinity &
            wait $!
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "rm -f /host-bin/katamaran"]
        volumeMounts:
        - name: host-root
          mountPath: /host-bin
          subPath: usr/local/bin
      - name: factory
        image: localhost/katamaran-factory:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        command: ["/usr/local/bin/katamaran-factory"]
        args:
          - "--listen"
          - "/var/run/katamaran/factory.sock"
          - "--watch-dir"
          - "/run/vc/vm/"
        volumeMounts:
        - name: run-vc
          mountPath: /run/vc
          readOnly: true
        - name: factory-sock
          mountPath: /var/run/katamaran
      terminationGracePeriodSeconds: 30
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      - name: run-vc
        hostPath:
          path: /run/vc
          type: DirectoryOrCreate
      - name: factory-sock
        hostPath:
          path: /var/run/katamaran
          type: DirectoryOrCreate
