apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: katamaran-deploy
  namespace: kube-system
  labels:
    app: katamaran
spec:
  selector:
    matchLabels:
      app: katamaran
  template:
    metadata:
      labels:
        app: katamaran
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        katacontainers.io/kata-runtime: "true"
      hostPID: true
      initContainers:
      - name: node-setup
        image: localhost/katamaran:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e

            # --- 1. Install katamaran binary ---
            mkdir -p /host/usr/local/bin
            cp /usr/local/bin/katamaran /host/usr/local/bin/katamaran
            cp /usr/local/bin/katamaran-factory /host/usr/local/bin/katamaran-factory
            chmod 0755 /host/usr/local/bin/katamaran /host/usr/local/bin/katamaran-factory
            echo "katamaran + factory binaries installed"

            # --- 2. Load required kernel modules ---
            for mod in ipip ip6_tunnel ip_gre ip6_gre sch_plug; do
              nsenter --target 1 --mount -- modprobe "$mod" 2>/dev/null \
                && echo "loaded $mod" \
                || echo "skipped $mod (not available)"
            done

            # --- 3. Enable Kata debug mode and QMP extra-monitor socket ---
            # Auto-detect config path: Kata >=3.25.0 uses runtimes/qemu/ subdir.
            KATA_CFG=""
            for candidate in \
              /host/opt/kata/share/defaults/kata-containers/runtimes/qemu/configuration-qemu.toml \
              /host/opt/kata/share/defaults/kata-containers/configuration-qemu.toml; do
              if [ -f "$candidate" ]; then KATA_CFG="$candidate"; break; fi
            done
            if [ -n "${KATA_CFG}" ]; then
              sed -i '/^\[hypervisor\.qemu\]/,/^\[/{
                s/^[[:space:]]*#\{0,1\}[[:space:]]*enable_debug = .*/enable_debug = true/
                s/^[[:space:]]*#\{0,1\}[[:space:]]*extra_monitor_socket = .*/extra_monitor_socket = "qmp"/
              }' "${KATA_CFG}"
              if grep -q '^[[:space:]]*enable_debug = true' "${KATA_CFG}" \
                && grep -q '^[[:space:]]*extra_monitor_socket = "qmp"' "${KATA_CFG}"; then
                echo "Kata debug mode and QMP extra-monitor socket enabled"
              else
                echo "Kata QMP config keys not found; leaving config unchanged"
              fi
            else
              echo "Kata config not found at ${KATA_CFG} — skipping QMP setup"
            fi

            # --- 4. Point Kata's vm_cache_endpoint at the katamaran
            #        factory socket BUT leave vm_cache_number=0.
            #
            # Why: Kata's vm_cache feature is tightly coupled to the
            # `kata-runtime factory init` lifecycle — kata-shim only
            # connects to vm_cache_endpoint when the runtime started a
            # factory process via that command, registering ownership
            # of the socket. Pointing vm_cache_endpoint at an
            # arbitrary process (us) does not cause kata-shim to dial
            # the socket; it just records a configured path. If we
            # ALSO set vm_cache_number=1, kata-runtime spins up its
            # own internal pre-warm VM but never consults our
            # factory, AND every fresh sandbox creation goes through
            # an extra cache-handshake codepath that timed out
            # CheckRequest in our cluster (kata-shim gRPC call to the
            # not-actually-registered cache).
            #
            # The katamaran factory's actual job today is to (a) hold
            # the migrated QEMU's metadata (migration-meta.json) so a
            # future adoption-shim integration can hand the running
            # VM to a fresh sandbox, and (b) serve VMConfig snapshots
            # to katamaran's own controller paths. Neither requires
            # vm_cache_number to be non-zero on the kata side.
            #
            # We still write vm_cache_endpoint to the katamaran
            # socket path so that, when adoption goes live (see
            # docs/ROADMAP.md "Kata Sandbox Adoption"), the wiring
            # is already in place — the only flip needed is enabling
            # the path on a per-sandbox annotation rather than
            # globally via vm_cache_number.
            if [ -n "${KATA_CFG}" ] && [ -f "${KATA_CFG}" ]; then
              if ! grep -q 'vm_cache_endpoint.*katamaran' "${KATA_CFG}"; then
                sed -i '/^\[factory\]/,/^\[/{
                  s|^#*vm_cache_number.*|vm_cache_number = 0|
                  s|^#*vm_cache_endpoint.*|vm_cache_endpoint = "/var/run/katamaran/factory.sock"|
                }' "${KATA_CFG}"
                if grep -q 'vm_cache_endpoint = "/var/run/katamaran/factory.sock"' "${KATA_CFG}"; then
                  echo "Kata factory endpoint configured for katamaran (vm_cache_number=0; factory dormant until adoption flow lands)"
                else
                  echo "Kata [factory] section not found; skipping factory config"
                fi
              else
                # Belt-and-braces: ensure vm_cache_number is 0 even
                # if the endpoint was already pointing at our socket
                # from a previous (now-rolled-back) install that set it
                # to 1.
                sed -i '/^\[factory\]/,/^\[/{
                  s|^vm_cache_number = 1$|vm_cache_number = 0|
                }' "${KATA_CFG}"
                echo "Kata factory endpoint already configured (vm_cache_number normalised to 0)"
              fi
            fi
        volumeMounts:
        - name: host-root
          mountPath: /host
          mountPropagation: HostToContainer
      containers:
      - name: keepalive
        image: localhost/katamaran:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 1m
            memory: 8Mi
          limits:
            cpu: 10m
            memory: 16Mi
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "katamaran node setup complete"
            trap 'rm -f /host-bin/katamaran /host-bin/katamaran-factory; echo "katamaran binaries removed"' TERM
            sleep infinity &
            wait $!
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "rm -f /host-bin/katamaran /host-bin/katamaran-factory"]
        volumeMounts:
        - name: host-root
          mountPath: /host-bin
          subPath: usr/local/bin
      - name: factory
        image: localhost/katamaran:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        command: ["/usr/local/bin/katamaran-factory"]
        args:
          - "--listen"
          - "/var/run/katamaran/factory.sock"
          - "--watch-dir"
          - "/run/vc/vm/"
        # Probe the unix socket the factory listens on. A missing socket
        # means the factory has not bound (startup) or has crashed; either
        # way kubelet should restart the container so Kata's vm_cache_endpoint
        # has something to talk to.
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "test -S /var/run/katamaran/factory.sock"]
          initialDelaySeconds: 2
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "test -S /var/run/katamaran/factory.sock"]
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: run-vc
          mountPath: /run/vc
          readOnly: true
        - name: factory-sock
          mountPath: /var/run/katamaran
      terminationGracePeriodSeconds: 30
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      - name: run-vc
        hostPath:
          path: /run/vc
          type: DirectoryOrCreate
      - name: factory-sock
        hostPath:
          path: /var/run/katamaran
          type: DirectoryOrCreate
