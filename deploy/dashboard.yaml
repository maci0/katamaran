apiVersion: v1
kind: ServiceAccount
metadata:
  name: katamaran-dashboard
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: katamaran-dashboard-role
  namespace: kube-system
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: katamaran-dashboard-binding
  namespace: kube-system
subjects:
- kind: ServiceAccount
  name: katamaran-dashboard
  namespace: kube-system
roleRef:
  kind: Role
  name: katamaran-dashboard-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: katamaran-dashboard
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katamaran-dashboard
  template:
    metadata:
      labels:
        app: katamaran-dashboard
    spec:
      serviceAccountName: katamaran-dashboard
      containers:
      - name: dashboard
        image: localhost/katamaran-dashboard:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: katamaran-dashboard
  namespace: kube-system
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: katamaran-dashboard
