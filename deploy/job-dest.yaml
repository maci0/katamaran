# Destination-side migration Job template.
# Rendered via envsubst by deploy/migrate.sh.
# Variables: NODE_NAME, IMAGE, QMP_SOCKET, EXTRA_ARGS, KATAMARAN_MIGRATION_ID, JOB_SUFFIX
apiVersion: batch/v1
kind: Job
metadata:
  name: katamaran-dest-${JOB_SUFFIX}
  namespace: kube-system
  labels:
    app.kubernetes.io/name: katamaran
    app.kubernetes.io/component: dest
    katamaran.io/migration-id: "${KATAMARAN_MIGRATION_ID}"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: katamaran-source
      automountServiceAccountToken: true
      nodeName: ${NODE_NAME}
      # hostNetwork: true so the dest QEMU's migrate-incoming listener on
      # tcp:[::]:4444 binds the node's IP (which the source sees as
      # `--dest-ip`). With pod-network IPs the source would need separate
      # discovery of the dest pod IP to reach the listener.
      hostNetwork: true
      hostPID: true
      restartPolicy: Never
      initContainers:
      - name: load-modules
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        command: ["/bin/sh", "-c"]
        args:
          - >-
            modprobe sch_plug 2>/dev/null || true;
            modprobe ipip 2>/dev/null || true;
            modprobe ip6_tunnel 2>/dev/null || true;
            modprobe ip_gre 2>/dev/null || true;
            modprobe ip6_gre 2>/dev/null || true
        volumeMounts:
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
      containers:
      - name: katamaran
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        env:
        - name: KATAMARAN_MIGRATION_ID
          value: "${KATAMARAN_MIGRATION_ID}"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: "4"
            memory: 4Gi
        command: ["/bin/sh", "-c", "mkdir -p \"$(dirname \"${QMP_SOCKET}\")\" && /usr/local/bin/katamaran --mode dest --qmp ${QMP_SOCKET} ${EXTRA_ARGS}"]
        volumeMounts:
        - name: run-vc
          mountPath: /run/vc
        - name: sys
          mountPath: /sys
        - name: dev-shm
          mountPath: /dev/shm
        - name: cmdline-dir
          mountPath: /tmp/katamaran-cmdlines
        - name: kata-shared
          mountPath: /run/kata-containers/shared/sandboxes
        - name: opt-kata
          mountPath: /opt/kata
          readOnly: true
      volumes:
      - name: run-vc
        hostPath:
          path: /run/vc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory
      - name: cmdline-dir
        # In --replay-cmdline mode, deploy/migrate.sh stages the captured
        # source QEMU cmdline at /tmp/katamaran-cmdlines/cmdline-<id>.txt
        # before this job starts. The dest binary reads the file and replays
        # the cmdline with -incoming defer to spawn a fresh QEMU.
        hostPath:
          path: /tmp/katamaran-cmdlines
          type: DirectoryOrCreate
      - name: dev-shm
        # The replayed source cmdline contains
        # `mem-path=/dev/shm,share=on` for the main RAM dimm. Default
        # container /dev/shm is 64 MiB which causes SIGBUS when source
        # transfers >64 MiB of RAM. Backed by tmpfs sized to the typical
        # kata-default 2 GiB plus headroom.
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
      - name: kata-shared
        # virtiofsd needs a writable shared dir that survives the dest job
        # pod for the lifetime of the spawned QEMU.
        hostPath:
          path: /run/kata-containers/shared/sandboxes
          type: DirectoryOrCreate
      - name: opt-kata
        # /opt/kata/bin/qemu-system-x86_64 + libexec/virtiofsd live here on
        # Kata-installed nodes; the dest binary spawns them directly.
        hostPath:
          path: /opt/kata
          type: Directory
