# Destination-side migration Job template.
# Rendered via envsubst by deploy/migrate.sh.
# Variables: NODE_NAME, IMAGE, QMP_SOCKET, EXTRA_ARGS, KATAMARAN_MIGRATION_ID
apiVersion: batch/v1
kind: Job
metadata:
  name: katamaran-dest
  namespace: kube-system
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 300
  template:
    spec:
      automountServiceAccountToken: false
      nodeName: ${NODE_NAME}
      hostNetwork: true
      hostPID: true
      restartPolicy: Never
      initContainers:
      - name: load-modules
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        command: ["/bin/sh", "-c"]
        args:
          - >-
            modprobe sch_plug 2>/dev/null || true;
            modprobe ipip 2>/dev/null || true;
            modprobe ip6_tunnel 2>/dev/null || true;
            modprobe ip_gre 2>/dev/null || true;
            modprobe ip6_gre 2>/dev/null || true
        volumeMounts:
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
      containers:
      - name: katamaran
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        env:
        - name: KATAMARAN_MIGRATION_ID
          value: "${KATAMARAN_MIGRATION_ID}"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: "1"
            memory: 256Mi
        command: ["/bin/sh", "-c", "mkdir -p \"$(dirname \"${QMP_SOCKET}\")\" && /usr/local/bin/katamaran --mode dest --qmp ${QMP_SOCKET} ${EXTRA_ARGS}"]
        volumeMounts:
        - name: run-vc
          mountPath: /run/vc
        - name: sys
          mountPath: /sys
      volumes:
      - name: run-vc
        hostPath:
          path: /run/vc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory
