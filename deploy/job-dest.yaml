# Destination-side migration Job template.
# Rendered via envsubst by deploy/migrate.sh.
# Variables: NODE_NAME, IMAGE, QMP_SOCKET, EXTRA_ARGS, KATAMARAN_MIGRATION_ID
apiVersion: batch/v1
kind: Job
metadata:
  name: katamaran-dest
  namespace: kube-system
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 300
  template:
    spec:
      automountServiceAccountToken: false
      nodeName: ${NODE_NAME}
      # hostNetwork is intentionally false: in --replay-cmdline mode the dest
      # pod IS the helper netns for the spawned QEMU. QEMU inherits this
      # pod's netns (no nsenter needed) and the pod's CNI-assigned IP becomes
      # the migration endpoint reachable from the source. Non-replay mode
      # does not need hostNetwork either — tc qdisc operations on the kata
      # sandbox tap are routed through `nsenter --net=/proc/<pid>/ns/net`.
      hostNetwork: false
      hostPID: true
      restartPolicy: Never
      initContainers:
      - name: load-modules
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        command: ["/bin/sh", "-c"]
        args:
          - >-
            modprobe sch_plug 2>/dev/null || true;
            modprobe ipip 2>/dev/null || true;
            modprobe ip6_tunnel 2>/dev/null || true;
            modprobe ip_gre 2>/dev/null || true;
            modprobe ip6_gre 2>/dev/null || true
        volumeMounts:
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
      containers:
      - name: katamaran
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        env:
        - name: KATAMARAN_MIGRATION_ID
          value: "${KATAMARAN_MIGRATION_ID}"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: "1"
            memory: 256Mi
        command: ["/bin/sh", "-c", "mkdir -p \"$(dirname \"${QMP_SOCKET}\")\" && /usr/local/bin/katamaran --mode dest --qmp ${QMP_SOCKET} ${EXTRA_ARGS}"]
        volumeMounts:
        - name: run-vc
          mountPath: /run/vc
        - name: sys
          mountPath: /sys
        - name: cmdline-dir
          mountPath: /tmp/katamaran-cmdlines
        - name: kata-shared
          mountPath: /run/kata-containers/shared/sandboxes
        - name: opt-kata
          mountPath: /opt/kata
          readOnly: true
      volumes:
      - name: run-vc
        hostPath:
          path: /run/vc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory
      - name: cmdline-dir
        # In --replay-cmdline mode, deploy/migrate.sh stages the captured
        # source QEMU cmdline at /tmp/katamaran-cmdlines/cmdline-<id>.txt
        # before this job starts. The dest binary reads the file and replays
        # the cmdline with -incoming defer to spawn a fresh QEMU.
        hostPath:
          path: /tmp/katamaran-cmdlines
          type: DirectoryOrCreate
      - name: kata-shared
        # virtiofsd needs a writable shared dir that survives the dest job
        # pod for the lifetime of the spawned QEMU.
        hostPath:
          path: /run/kata-containers/shared/sandboxes
          type: DirectoryOrCreate
      - name: opt-kata
        # /opt/kata/bin/qemu-system-x86_64 + libexec/virtiofsd live here on
        # Kata-installed nodes; the dest binary spawns them directly.
        hostPath:
          path: /opt/kata
          type: Directory
