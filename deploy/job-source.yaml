apiVersion: v1
kind: ServiceAccount
metadata:
  name: katamaran-source
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: katamaran-source
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: katamaran-source
subjects:
- kind: ServiceAccount
  name: katamaran-source
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: katamaran-source
  apiGroup: rbac.authorization.k8s.io
---
# Source-side migration Job template.
# Rendered via envsubst by deploy/migrate.sh.
# Variables: NODE_NAME, IMAGE, QMP_SOCKET, DEST_IP, VM_IP, EXTRA_ARGS, KATAMARAN_MIGRATION_ID
apiVersion: batch/v1
kind: Job
metadata:
  name: katamaran-source
  namespace: kube-system
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: katamaran-source
      automountServiceAccountToken: true
      nodeName: ${NODE_NAME}
      hostNetwork: true
      hostPID: true
      restartPolicy: Never
      initContainers:
      - name: load-modules
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        command: ["/bin/sh", "-c"]
        args:
          - >-
            modprobe sch_plug 2>/dev/null || true;
            modprobe ipip 2>/dev/null || true;
            modprobe ip6_tunnel 2>/dev/null || true;
            modprobe ip_gre 2>/dev/null || true;
            modprobe ip6_gre 2>/dev/null || true
        volumeMounts:
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
      containers:
      - name: katamaran
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        env:
        - name: KATAMARAN_MIGRATION_ID
          value: "${KATAMARAN_MIGRATION_ID}"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: "1"
            memory: 256Mi
        command: ["/bin/sh", "-c", "/usr/local/bin/katamaran --mode source --dest-ip ${DEST_IP} ${EXTRA_ARGS}"]
        volumeMounts:
        - name: run-vc
          mountPath: /run/vc
        - name: sys
          mountPath: /sys
        - name: cmdline-dir
          mountPath: /tmp/katamaran-cmdlines
      volumes:
      - name: run-vc
        hostPath:
          path: /run/vc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory
      - name: cmdline-dir
        # Used by --emit-cmdline-to in --replay-cmdline mode. The orchestrator
        # (deploy/migrate.sh) kubectl-cps the captured QEMU cmdline file from
        # this dir to the dest node's matching mount. Always mounted so the
        # job manifest is identical between modes; harmless when the flag is
        # not set (the file is simply never written).
        hostPath:
          path: /tmp/katamaran-cmdlines
          type: DirectoryOrCreate
