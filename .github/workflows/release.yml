# Release workflow: build + push multi-arch container images to GHCR
# whenever a `v*` semver tag is pushed (annotated or lightweight). Also
# creates a GitHub Release with the matching CHANGELOG.md section.
#
# Tag flow:
#   git tag -a v0.2.0 -m "katamaran v0.2.0"
#   git push origin v0.2.0
# triggers this workflow.
#
# Security: the only context inputs we touch are github.ref_name (the
# tag name, repo-controlled) and github.repository_owner (also repo-
# controlled). Both are passed via env: blocks rather than direct ${{ }}
# expansion in run: scripts so a hostile fork PR couldn't smuggle a
# command even if pull_request triggers were added later.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Release
  packages: write   # push to ghcr.io/<owner>/...

jobs:
  images:
    name: Build + push images (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: katamaran
            file: Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/katamaran
          - name: dashboard
            file: Dockerfile.dashboard
            image: ghcr.io/${{ github.repository_owner }}/katamaran-dashboard
          - name: mgr
            file: Dockerfile.mgr
            image: ghcr.io/${{ github.repository_owner }}/katamaran-mgr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ matrix.image }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # github.ref_name is e.g. "v0.1.0" for a tag push. Emit two
          # tags: the exact version and a moving "latest" pointer.
          {
            echo "tags<<EOF"
            printf '%s:%s\n' "$IMAGE" "$REF_NAME"
            printf '%s:latest\n' "$IMAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build + push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=release-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.name }}
          provenance: false

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [images]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Extract changelog section
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Pull out everything between "## [<version>]" and the next
          # "## [" header. CHANGELOG.md uses bare semver section headers,
          # so strip the leading "v" from the tag.
          version="${REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; print; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf '## %s\n\nSee CHANGELOG.md for details.\n' "$REF_NAME" > release-notes.md
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
