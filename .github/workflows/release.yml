# Release workflow: build + push multi-arch container images to GHCR
# whenever a `v*` semver tag is pushed (annotated or lightweight). Also
# creates a GitHub Release with the matching CHANGELOG.md section.
#
# Tag flow:
#   git tag -a v0.2.0 -m "katamaran v0.2.0"
#   git push origin v0.2.0
# triggers this workflow.
#
# Security: the only context inputs we touch are github.ref_name (the
# tag name, repo-controlled) and github.repository_owner (also repo-
# controlled). Both are passed via env: blocks rather than direct ${{ }}
# expansion in run: scripts so a hostile fork PR couldn't smuggle a
# command even if pull_request triggers were added later.
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GOVULNCHECK_VERSION: v1.3.0
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must be semver-like, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi
      - name: Verify go modules
        run: go mod verify
      - name: Lint
        run: make vet
      - name: Lint shell scripts
        run: shellcheck -x -e SC1091,SC2016,SC2155,SC2317,SC2329 scripts/*.sh deploy/migrate.sh
      - name: Cache govulncheck binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}
      - name: Vulnerability check
        run: |
          if [ ! -x "$HOME/go/bin/govulncheck" ]; then
            go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          fi
          "$HOME/go/bin/govulncheck" ./...
      - name: Build all binaries
        run: make -j4 all
      - name: Unit tests
        run: make test
      - name: Fuzz seeds
        run: make fuzz
      - name: Smoke tests
        run: make smoke

  images:
    name: Build + push images (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [verify]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: katamaran
            file: Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/katamaran
            smoke: --version
          - name: dashboard
            file: Dockerfile.dashboard
            image: ghcr.io/${{ github.repository_owner }}/katamaran-dashboard
            smoke: --version
          - name: mgr
            file: Dockerfile.mgr
            image: ghcr.io/${{ github.repository_owner }}/katamaran-mgr
            smoke: --version
          - name: factory
            file: Dockerfile.factory
            image: ghcr.io/${{ github.repository_owner }}/katamaran-factory
            smoke: --version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ matrix.image }}
          REF_NAME: ${{ github.ref_name }}
          REF_SHA: ${{ github.sha }}
        run: |
          # github.ref_name is e.g. "v0.1.0" for a tag push. Emit the
          # exact version plus a sha-* tag so rollbacks can target the
          # exact source. Only move the ":latest" pointer for stable
          # releases (X.Y.Z); prereleases like v1.0.0-rc.1 must not
          # overwrite latest for downstream consumers.
          {
            echo "tags<<EOF"
            printf '%s:%s\n' "$IMAGE" "$REF_NAME"
            printf '%s:sha-%s\n' "$IMAGE" "$REF_SHA"
            if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              printf '%s:latest\n' "$IMAGE"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build native image for pre-push smoke test
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.file }}
          tags: ${{ matrix.image }}:smoke
          load: true
          push: false
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=release-${{ matrix.name }}
      - name: Smoke-test ${{ matrix.name }} image
        env:
          IMAGE_TAG: ${{ matrix.image }}:smoke
          SMOKE_CMD: ${{ matrix.smoke }}
        run: docker run --rm "${IMAGE_TAG}" ${SMOKE_CMD}
      - name: Build + push ${{ matrix.name }} image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=release-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.name }}
          provenance: mode=max
          sbom: true

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Detect prerelease
        id: prerelease
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Tags like v1.2.3 are stable; v1.2.3-rc.1 / v1.2.3-beta.2 are
          # prereleases. Tag format already validated upstream by verify.
          if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract changelog section
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Pull out everything between "## [<version>]" and the next
          # "## [" header. CHANGELOG.md uses bare semver section headers,
          # so strip the leading "v" from the tag.
          version="${REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; print; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf '## %s\n\nSee CHANGELOG.md for details.\n' "$REF_NAME" > release-notes.md
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release-notes.md
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: false
