name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Only cancel in-flight runs on PRs. On main pushes, let every commit's
  # CI finish so we keep a per-commit signal (useful when tagging or when
  # several merges land in quick succession).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GOVULNCHECK_VERSION: v1.3.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify go modules
        run: go mod verify
      - name: Lint
        run: make vet
      - name: Cache govulncheck binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}
      - name: Vulnerability check
        # Install + run govulncheck directly. The previous
        # golang/govulncheck-action runs a nested actions/checkout that
        # conflicts with the outer actions/checkout v6's persistent
        # credentials, producing a `remote: Duplicate header:
        # "Authorization"` HTTP 400. Direct invocation bypasses the
        # nested checkout entirely. No untrusted input is interpolated.
        run: |
          if [ ! -x "$HOME/go/bin/govulncheck" ]; then
            go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          fi
          "$HOME/go/bin/govulncheck" ./...
      - name: Unit tests
        run: make test
      - name: Fuzz seeds
        run: make fuzz

  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Lint shell scripts
        run: shellcheck -x -e SC1091,SC2016,SC2155,SC2317,SC2329 scripts/*.sh deploy/migrate.sh

  dependency-review:
    # Surface known-vulnerable / license-incompatible deps newly introduced
    # by a PR before merge. Skipped on push events because the action only
    # supports diff-based comparison via the GitHub API.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4.10.0
        with:
          fail-on-severity: high

  build-and-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binaries
        run: make -j4 all
      - name: Smoke tests
        run: make smoke

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [lint-and-test, build-and-smoke, shellcheck]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: katamaran
            file: Dockerfile
            tag: katamaran:ci
            smoke: --version
          - name: dashboard
            file: Dockerfile.dashboard
            tag: katamaran-dashboard:ci
            smoke: --version
          - name: mgr
            file: Dockerfile.mgr
            tag: katamaran-mgr:ci
            smoke: --version
          - name: factory
            file: Dockerfile.factory
            tag: katamaran-factory:ci
            smoke: --version
    env:
      VERSION_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build ${{ matrix.name }} image (multi-arch)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=${{ env.VERSION_SHA }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
      - name: Build native image for smoke test
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.file }}
          tags: ${{ matrix.tag }}
          load: true
          push: false
          build-args: |
            VERSION=${{ env.VERSION_SHA }}
          cache-from: type=gha,scope=${{ matrix.name }}
      - name: Smoke-test ${{ matrix.name }} image
        env:
          IMAGE_TAG: ${{ matrix.tag }}
          SMOKE_CMD: ${{ matrix.smoke }}
        run: docker run --rm "${IMAGE_TAG}" ${SMOKE_CMD}
