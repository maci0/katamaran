name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Verify go modules
        run: go mod verify
      - name: Lint
        run: make vet
      - name: Vulnerability check
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: make test
      - name: Fuzz seeds
        run: make fuzz

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lint shell scripts
        run: shellcheck -x -e SC1091,SC2016,SC2155,SC2317,SC2329 scripts/*.sh deploy/migrate.sh

  template-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Job templates in deploy/ match internal/orchestrator/templates/
        run: |
          diff -u deploy/job-source.yaml internal/orchestrator/templates/job-source.yaml
          diff -u deploy/job-dest.yaml internal/orchestrator/templates/job-dest.yaml

  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: make -j4 all
      - name: Smoke tests
        run: make smoke

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-test, build-and-smoke, shellcheck, template-sync]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: katamaran
            file: Dockerfile
            tag: katamaran:ci
            smoke: --version
          - name: dashboard
            file: Dockerfile.dashboard
            tag: katamaran-dashboard:ci
            smoke: --version
          - name: mgr
            file: Dockerfile.mgr
            tag: katamaran-mgr:ci
            smoke: --version
    env:
      VERSION_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build ${{ matrix.name }} image
        env:
          IMAGE_FILE: ${{ matrix.file }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: docker build --build-arg "VERSION=${VERSION_SHA}" -t "${IMAGE_TAG}" -f "${IMAGE_FILE}" .
      - name: Smoke-test ${{ matrix.name }} image
        env:
          IMAGE_TAG: ${{ matrix.tag }}
          SMOKE_CMD: ${{ matrix.smoke }}
        run: docker run --rm "${IMAGE_TAG}" ${SMOKE_CMD}
