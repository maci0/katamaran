apiVersion: v1
kind: Pod
metadata:
  name: nginx-kata
  labels:
    app: nginx
spec:
  runtimeClassName: kata-qemu
  nodeName: katamaran-demo
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30081
  selector:
    app: nginx
