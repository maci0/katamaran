# RBAC + Deployment for the katamaran-mgr controller. Apply after the CRD
# (config/crd/migration.yaml) has been registered.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: katamaran-mgr
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: katamaran-mgr
rules:
# Migration CRs.
- apiGroups: ["katamaran.io"]
  resources: ["migrations"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["katamaran.io"]
  resources: ["migrations/status"]
  verbs: ["get", "patch", "update"]
# Pods/nodes for the orchestrator's discoverer + resolver lookups.
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  # create: adoption pod for migrated VM (spec.adoptVM=true).
  # patch + delete: spec.sourceCleanup=orphan removes ownerReferences, then deletes.
  # delete: spec.sourceCleanup=delete deletes the source pod outright.
  verbs: ["get", "list", "watch", "create", "patch", "delete"]
# Tail source pod logs for KATAMARAN_PROGRESS / KATAMARAN_RESULT
# markers and (for the dest binary in replayCmdline mode) read the
# source pod's KATAMARAN_CMDLINE_B64 marker.
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# Jobs the Native orchestrator submits.
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
# Leader election: client-go's leaderelection.LeaseLock acquires a Lease
# in this controller's namespace.
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update"]
# Webhook bootstrap: mgr generates a self-signed cert at startup and
# patches its CA bundle onto the ValidatingWebhookConfiguration so the
# apiserver trusts it. Get on configurations is enough for the no-op
# path; update fires only when the CA bundle changes.
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingwebhookconfigurations"]
  resourceNames: ["katamaran-mgr"]
  verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: katamaran-mgr
subjects:
- kind: ServiceAccount
  name: katamaran-mgr
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: katamaran-mgr
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: katamaran-mgr
  namespace: kube-system
spec:
  # Keep at least one mgr alive during voluntary disruptions (node drain,
  # cluster autoscaler eviction, kubectl drain). The reconciler is
  # leader-elected so the surviving replica continues to dispatch the
  # in-flight Migration CR while the evicted pod is rescheduled.
  minAvailable: 1
  selector:
    matchLabels: { app: katamaran-mgr }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: katamaran-mgr
  namespace: kube-system
spec:
  # Two replicas exercise the leader-election Lease the controller
  # already wires (see katamaran-mgr's leaderelection.RunOrDie call).
  # Only the lease holder reconciles; the standby is hot and takes
  # over within ~LeaseDuration (15s) on a primary failure.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Allow one pod down during rollouts so the lease holder can
      # gracefully step down before the new image takes leadership.
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels: { app: katamaran-mgr }
  template:
    metadata:
      labels: { app: katamaran-mgr }
    spec:
      serviceAccountName: katamaran-mgr
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Spread the two replicas across nodes when the cluster has more
      # than one. Soft preference (preferredDuringScheduling) so a
      # single-node cluster still schedules both — they just both run
      # there, lease-elect normally, and only one reconciles.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels: { app: katamaran-mgr }
      containers:
      - name: mgr
        image: localhost/katamaran-mgr:dev
        imagePullPolicy: IfNotPresent
        args: []
        ports:
        - name: debug
          containerPort: 8081
        - name: webhook
          containerPort: 9443
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits:   { cpu: 500m, memory: 256Mi }
        livenessProbe:
          httpGet:
            path: /healthz
            port: debug
          initialDelaySeconds: 5
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: debug
          initialDelaySeconds: 2
          periodSeconds: 10
        # Match the Dockerfile's `USER mgr` (uid 1000) numerically — Kubelet's
        # runAsNonRoot check rejects images that declare USER by name.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
---
# Service the apiserver dials to reach the validating admission webhook.
# Multi-replica mgr Deployment + leader election: any replica serves
# the webhook (admission decisions don't need a leader; pendingAdoption
# state is filled by the leader and read here, so non-leader webhook
# answers may miss a recently-marked entry — accepted trade-off vs.
# routing all admission traffic through one replica).
apiVersion: v1
kind: Service
metadata:
  name: katamaran-mgr-webhook
  namespace: kube-system
spec:
  selector:
    app: katamaran-mgr
  ports:
  - name: webhook
    port: 443
    targetPort: webhook
---
# ValidatingWebhookConfiguration intercepts Pod CREATE; mgr's webhook
# denies RS-driven replacement creates during the source-deleted-
# adoption-pending window (see internal/controller/admission.go).
#
# caBundle is patched at runtime by mgr (in-process self-signed cert).
# The placeholder below is replaced on the leader's startup; until
# that patch lands, failurePolicy=Ignore keeps the cluster usable.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: katamaran-mgr
webhooks:
- name: pods.katamaran.io
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Ignore
  timeoutSeconds: 5
  matchPolicy: Equivalent
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
    operations: ["CREATE"]
    scope: Namespaced
  clientConfig:
    service:
      name: katamaran-mgr-webhook
      namespace: kube-system
      path: /admit
      port: 443
    # caBundle is patched at runtime by mgr via
    # patchWebhookConfigCABundle. Until then, failurePolicy=Ignore
    # keeps cluster usable.
    caBundle: Cg==
