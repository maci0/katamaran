# RBAC + Deployment for the katamaran-mgr controller. Apply after the CRD
# (config/crd/migration.yaml) has been registered.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: katamaran-mgr
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: katamaran-mgr
rules:
# Migration CRs.
- apiGroups: ["katamaran.io"]
  resources: ["migrations"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["katamaran.io"]
  resources: ["migrations/status"]
  verbs: ["get", "patch", "update"]
# Pods/nodes for the orchestrator's discoverer + resolver lookups.
# Pod create/delete is needed because replayCmdline mode spawns a
# transient stager pod on the dest node to receive the cmdline file.
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
# Tail source pod logs for KATAMARAN_PROGRESS / KATAMARAN_RESULT markers.
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# SPDY exec into the source/stager pod to stage the captured QEMU
# cmdline before submitting the dest Job (replayCmdline mode).
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
# Jobs the Native orchestrator submits.
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
# Leader election: client-go's leaderelection.LeaseLock acquires a Lease
# in this controller's namespace.
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: katamaran-mgr
subjects:
- kind: ServiceAccount
  name: katamaran-mgr
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: katamaran-mgr
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: katamaran-mgr
  namespace: kube-system
spec:
  # Keep at least one mgr alive during voluntary disruptions (node drain,
  # cluster autoscaler eviction, kubectl drain). The reconciler is
  # leader-elected so the surviving replica continues to dispatch the
  # in-flight Migration CR while the evicted pod is rescheduled.
  minAvailable: 1
  selector:
    matchLabels: { app: katamaran-mgr }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: katamaran-mgr
  namespace: kube-system
spec:
  # Two replicas exercise the leader-election Lease the controller
  # already wires (see katamaran-mgr's leaderelection.RunOrDie call).
  # Only the lease holder reconciles; the standby is hot and takes
  # over within ~LeaseDuration (15s) on a primary failure.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Allow one pod down during rollouts so the lease holder can
      # gracefully step down before the new image takes leadership.
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels: { app: katamaran-mgr }
  template:
    metadata:
      labels: { app: katamaran-mgr }
    spec:
      serviceAccountName: katamaran-mgr
      # Spread the two replicas across nodes when the cluster has more
      # than one. Soft preference (preferredDuringScheduling) so a
      # single-node cluster still schedules both — they just both run
      # there, lease-elect normally, and only one reconciles.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels: { app: katamaran-mgr }
      containers:
      - name: mgr
        image: localhost/katamaran-mgr:dev
        imagePullPolicy: IfNotPresent
        args: []
        ports:
        - name: debug
          containerPort: 8081
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits:   { cpu: 500m, memory: 256Mi }
        livenessProbe:
          httpGet:
            path: /healthz
            port: debug
          initialDelaySeconds: 5
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: debug
          initialDelaySeconds: 2
          periodSeconds: 10
        # Match the Dockerfile's `USER mgr` (uid 1000) numerically — Kubelet's
        # runAsNonRoot check rejects images that declare USER by name.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
