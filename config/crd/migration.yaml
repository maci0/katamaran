apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: migrations.katamaran.io
spec:
  group: katamaran.io
  names:
    kind: Migration
    listKind: MigrationList
    plural: migrations
    singular: migration
    shortNames: [mig]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          spec:
            type: object
            required: [sourcePod, destNode, image]
            properties:
              sourcePod:
                description: Reference to the source kata pod (namespace + name).
                type: object
                required: [namespace, name]
                properties:
                  namespace:
                    type: string
                    minLength: 1
                    maxLength: 253
                    pattern: '^[a-zA-Z0-9_./:@=-]+$'
                  name:
                    type: string
                    minLength: 1
                    maxLength: 253
                    pattern: '^[a-zA-Z0-9_./:@=-]+$'
              destPod:
                description: |
                  Optional reference to a kata pod on the destination node whose
                  sandbox QMP socket the dest job should connect to. Required when
                  replayCmdline is false.
                type: object
                required: [namespace, name]
                properties:
                  namespace:
                    type: string
                    minLength: 1
                    maxLength: 253
                    pattern: '^[a-zA-Z0-9_./:@=-]+$'
                  name:
                    type: string
                    minLength: 1
                    maxLength: 253
                    pattern: '^[a-zA-Z0-9_./:@=-]+$'
              destNode:
                description: Kubernetes node name to migrate to.
                type: string
                minLength: 1
                maxLength: 253
                pattern: '^[a-zA-Z0-9_./:@=-]+$'
              image:
                description: katamaran container image used for source/dest jobs.
                type: string
                minLength: 1
                maxLength: 512
                pattern: '^[a-zA-Z0-9_./:@=-]+$'
              sharedStorage:
                description: Skip NBD drive-mirror (Ceph/NFS).
                type: boolean
                default: false
              replayCmdline:
                description: Capture source QEMU cmdline + replay on dest with -incoming defer.
                type: boolean
                default: false
              tunnelMode:
                type: string
                enum: [ipip, gre, none]
                default: ipip
              downtimeMS:
                type: integer
                minimum: 1
                maximum: 60000
                default: 25
              autoDowntime:
                type: boolean
                default: false
              multifdChannels:
                type: integer
                minimum: 0
                default: 0
          status:
            type: object
            properties:
              phase:
                description: |
                  Lifecycle phase: submitted, dest-starting, src-starting,
                  transferring, cutover, succeeded, failed.
                type: string
                enum: [submitted, dest-starting, src-starting, transferring, cutover, succeeded, failed]
              migrationID:
                description: Orchestrator-assigned correlation ID propagated to katamaran logs.
                type: string
                pattern: '^[a-f0-9]{16}$'
              message:
                type: string
              error:
                type: string
              startedAt:
                type: string
                format: date-time
              completedAt:
                type: string
                format: date-time
              ramTransferred:
                type: integer
                format: int64
                minimum: 0
              ramTotal:
                type: integer
                format: int64
                minimum: 0
              actualDowntimeMS:
                description: |
                  Actual VM pause duration measured by QEMU's query-migrate
                  after the cutover completes.
                type: integer
                format: int64
                minimum: 0
              appliedDowntimeMS:
                description: |
                  The downtime limit the source binary programmed into QEMU
                  before starting RAM migration. Equals .spec.downtimeMS when
                  .spec.autoDowntime is false, or the auto-calculated
                  rtt*multiplier+overhead value when true.
                type: integer
                format: int64
                minimum: 0
              rttMS:
                description: |
                  Round-trip-time measurement that fed the auto-downtime
                  calculation. Zero when .spec.autoDowntime is false or RTT
                  measurement failed (and the source fell back to
                  .spec.downtimeMS).
                type: integer
                format: int64
                minimum: 0
              autoDowntime:
                description: |
                  True when appliedDowntimeMS came from the source binary's
                  RTT-based auto-calculation instead of .spec.downtimeMS.
                type: boolean
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Source
      type: string
      jsonPath: .spec.sourcePod.name
    - name: Dest
      type: string
      jsonPath: .spec.destNode
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Downtime
      type: integer
      format: int64
      jsonPath: .status.actualDowntimeMS
      priority: 1
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
